dispatch:
  version: "1.0"
  date: "2026-05-14"
  persona: Glyph
  subject: "V3-2 design — remote symbol resolution"
  capability_hash: "sha256:42d73647ba8de29a7d219bf2218bad0a42dc2a11d7878cac12ee931be2a1a185"
  requirement: "V3-2"
  status: "design — not yet implemented"
  components:
    - name: "--read-only flag on codifide serve"
      scope: "in"
      complexity: "trivial"
    - name: "RemoteStore class (fetch-and-cache with hash-verification)"
      scope: "in"
      complexity: "moderate"
    - name: "codifide store push <identity> [--registry <url>]"
      scope: "in"
      complexity: "low"
    - name: "--registry flag on codifide run"
      scope: "in"
      complexity: "low"
    - name: "docs/RPC_API.md update"
      scope: "in"
      complexity: "trivial"
    - name: "codifide.com deployment"
      scope: "out"
      reason: "infrastructure, not code"
    - name: "Rust runtime remote resolution"
      scope: "out"
      reason: "Python CLI handles via --store; Rust unchanged"
    - name: "auth on public registry"
      scope: "out"
      reason: "reverse proxy concern"
  trust_model: "hash-verification — registry cannot forge a symbol without changing its identity"
  implementation_order: ["--read-only flag", "RemoteStore + tests", "store push + tests", "--registry on run + integration test", "docs update"]
  estimated_scope: "one session"
  acceptance: "agent on machine B resolves symbol published by agent on machine A using only content identity and --registry flag"
  open_questions_resolved:
    - q: "Should RemoteStore be the default?"
      a: "No — opt-in via --registry; silent network calls would surprise agents"
    - q: "Should push require local store?"
      a: "Yes — store put first, then push"
    - q: "Should public registry accept writes?"
      a: "No — read-only; agents push via local server + store push"
    - q: "What happens when registry unreachable?"
      a: "StoreError with clear message; fail loudly, no silent fallback"
