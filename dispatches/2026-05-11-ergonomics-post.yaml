dispatch:
  schema: codifide.dispatch/0.1
  subject: ergonomics pass — post-fix dispatch (2026-05-11)
  at: 2026-05-11
  author: Glyph
  intent: >
    Attest that the fixes promised in the paired decisions dispatch
    have landed, with evidence per item. Pairs with the Quill readout.

  state:
    shipped:
      - parser-accepts-multi-line-expressions-in-cand-pre-post-when-bind
      - reverse-polymorphic-over-string-and-list
      - hint-messages-for-percent-str-reverse-clock-hour-and-siblings
      - docs-agent-quickref
      - spec-update-line-continuation
      - spec-update-primitive-polymorphism
      - regression-tests-for-gemini-crashes-and-hint-fires
      - capability-manifest-refresh
    in_flight: []
    blocked: []
    refused:
      - infix-percent-as-sugar-for-mod
      - inline-if-or-when-as-statement
      - separate-str-reverse-primitive

  evidence:
    - claim: classify_numeric.cod now runs end-to-end
      kind: run
      source: "python3 -m codifide run examples/ai_generated/classify_numeric.cod"
      result: "['low', 'medium', 'high']"
      confidence: 1.0

    - claim: palindrome.cod now runs end-to-end
      kind: run
      source: "python3 -m codifide run examples/ai_generated/palindrome.cod"
      result: "[True, False]"
      confidence: 1.0

    - claim: polymorphic reverse works on strings
      kind: run
      source: "reverse(\"agent\") in a minimal def"
      result: "'tnega'"
      confidence: 1.0

    - claim: polymorphic reverse still works on lists
      kind: run
      source: "examples/ai_generated/palindrome.cod uses reverse on a list"
      result: "[True, False]"
      confidence: 1.0

    - claim: % operator error names the mod primitive
      kind: run
      source: "python3 -m codifide run examples/ai_generated/is_even.cod"
      result: "ParseError: unexpected character '%' ... hint: use `mod(a, b)`"
      confidence: 1.0

    - claim: str.reverse error names polymorphic reverse
      kind: run
      source: "python3 -m codifide run examples/ai_generated/reverse.cod"
      result: "unknown callable: 'str.reverse' ... hint: use `reverse(s)` — `reverse` is polymorphic"
      confidence: 1.0

    - claim: clock.hour error names clock.now
      kind: run
      source: "python3 -m codifide run examples/ai_generated/greet_by_time.cod"
      result: "unknown callable: 'clock.hour' ... hint: use `clock.now`"
      confidence: 1.0

    - claim: Python test suite at 129/129
      kind: test
      source: "python3 -m codifide test"
      result: "Ran 129 tests in 0.659s; OK"
      confidence: 1.0

    - claim: Rust canonical conformance at 10/10
      kind: test
      source: "cargo test --release -p codifide-canonical"
      result: "10 passed; 0 failed"
      confidence: 1.0

    - claim: capability manifest hash moved due to reverse return-type change
      kind: measure
      source: "python3 -m codifide capability --hash"
      result: "sha256:845dbbbff6b8ba8957dc40383e9a54b386b172f8fa70ccc16a18be10e498afd4"
      confidence: 1.0

    - claim: docs/AGENT_QUICKREF.md is linked from README and FOR_AGENTS
      kind: read
      source: "README.md, docs/FOR_AGENTS.md"
      result: "Both reference docs/AGENT_QUICKREF.md as the one-page distillation"
      confidence: 1.0

  audit_resolution:
    - finding: AUD-2026-05-11-01 (parser leaks AttributeError)
      severity: P1
      status: fixed
      probe_now_passes: "python3 -m codifide run examples/ai_generated/classify_numeric.cod"

    - finding: AUD-2026-05-11-02 (unknown-callable is uninformative)
      severity: P2
      status: fixed
      probe_now_passes: "python3 -m codifide run examples/ai_generated/reverse.cod (error now carries a hint)"

    - finding: AUD-2026-05-11-03 (spec silent on primitive polymorphism)
      severity: P3
      status: fixed
      probe_now_passes: "docs/LANGUAGE.md now has a Primitive polymorphism section"

  unknowns:
    - question: Does the quickref improve fresh-agent first-attempt success rates?
      why_unknown: Unmeasured. The experiment is a future external-model run with no coaching.
      how_to_resolve: Hand the next external model the repo + pointer to FOR_AGENTS.md and re-run the program-feedback battery.

    - question: Are there other common-guess misses not yet in the hint table?
      why_unknown: Only four models have reviewed; misses from other model families are unobserved.
      how_to_resolve: Every feedback dispatch in dispatches/feedback/ should be scanned for new misses; hint table extended as patterns appear.

    - question: Should the canonical manifest be migrated from JSON to CBOR before v1.0?
      why_unknown: Pre-existing open item from CBOR dispatch; unaffected by this pass.
      how_to_resolve: Design the migration plan as a separate dispatch.

  next:
    - action: publish paired dispatches (this dispatch + the Quill readout)
      depends_on: []
      effect: "{fs.write}"

    - action: update CHANGELOG.md with the ergonomics-pass entry
      depends_on: []
      effect: "{fs.write}"

    - action: update sessions/2026-05-10.md to a new session file or extend with 2026-05-11 entry
      depends_on: []
      effect: "{fs.write}"

    - action: (future) run fresh-agent external experiment against the new manifest hash
      depends_on: []
      effect: "{external.review}"

  links:
    human_readout: dispatches/2026-05-11-ergonomics-post.readout.md
    decisions_readout: dispatches/2026-05-11-ergonomics-decisions.readout.md
    decisions_yaml: dispatches/2026-05-11-ergonomics-decisions.yaml
    audit: dispatches/2026-05-11-ergonomics-audit.md
    manifest_hash: sha256:845dbbbff6b8ba8957dc40383e9a54b386b172f8fa70ccc16a18be10e498afd4
