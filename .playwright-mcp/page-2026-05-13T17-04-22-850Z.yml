        - generic [ref=e182]:
          - blockquote [ref=e183]:
            - paragraph [ref=e184]: "\"The danger isn't that AI builds bad software. It's that AI builds software so fast that governance can't keep up.\""
          - blockquote [ref=e185]:
            - paragraph [ref=e186]: "\"Kill early, kill cheap. A failed gate at G1 costs hours. A failed gate at G5 costs months.\""
          - blockquote [ref=e187]:
            - paragraph [ref=e188]: "\"Agent-authored code does not have the same failure modes as human-authored code. Our governance frameworks haven't caught up.\""
