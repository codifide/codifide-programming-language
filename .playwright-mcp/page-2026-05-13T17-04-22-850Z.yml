    - region "AI Governance Thinking" [ref=e131]:
      - generic [ref=e133]:
        - generic [ref=e134]:
          - generic [ref=e135]:
            - heading "AI Governance Thinking" [level=2] [ref=e136]
            - paragraph [ref=e137]:
              - text: Agentic AI removes the speed constraint on building. It does not remove the constraint on safety. The question isn't
              - emphasis [ref=e138]: "\"can AI build it?\""
              - text: — it's
              - emphasis [ref=e139]: "\"should this ship?\""
          - generic [ref=e140]:
            - generic [ref=e141]:
              - img [ref=e143]
              - generic [ref=e145]:
                - heading "Speed without governance is faster failure" [level=3] [ref=e146]
                - paragraph [ref=e147]: AI can produce 50 files in an hour. The bottleneck is no longer building — it's deciding what to ship. Governance frameworks must evolve to match the pace of agentic development, not lag behind it.
            - generic [ref=e148]:
              - img [ref=e150]
              - generic [ref=e152]:
                - heading "Evidence, not confidence" [level=3] [ref=e153]
                - paragraph [ref=e154]: "\"We think it's fine\" is not a gate pass. Every gate requires artifacts — test coverage reports, security sign-offs, accessibility audits, integration tests against real backends. Not demos. Not decks."
            - generic [ref=e155]:
              - img [ref=e157]
              - generic [ref=e159]:
                - heading "The builder cannot review their own work" [level=3] [ref=e160]
                - paragraph [ref=e161]: "Teams immersed in development share the same blind spots. A separate adversarial reviewer — different model, different prompt, hostile persona — attacks every gate. A Zero-Context reviewer reads the work as a regulator would: knowing nothing, asking everything."
            - generic [ref=e162]:
              - img [ref=e164]
              - generic [ref=e166]:
                - heading "AI builds. Humans decide." [level=3] [ref=e167]
                - paragraph [ref=e168]: The gate decision — go, kill, hold — is never delegated to the machine. AI provides evidence. Humans decide what ships. That boundary is not a limitation of AI; it's the architecture of accountability.
            - generic [ref=e169]:
              - img [ref=e171]
              - generic [ref=e175]:
                - heading "Intent must survive compilation" [level=3] [ref=e176]
                - paragraph [ref=e177]: When an agent transforms code, the original intent should be preserved — not discarded. Systems that lose intent create accountability gaps that compound at scale. The language is the governance.
          - generic [ref=e178]:
            - link "Read the whitepaper →" [ref=e179] [cursor=pointer]:
