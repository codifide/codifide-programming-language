          - article "The Codifide Programming Language" [ref=e29]:
            - generic [ref=e30]:
              - img "Codifide Programming Language" [ref=e32]
              - generic [ref=e33]: Open Source · v1.0
            - heading "The Codifide Programming Language" [level=3] [ref=e34]
            - paragraph [ref=e35]: A programming language that codifies what software usually leaves implicit — for a world where agents write the code.
            - paragraph [ref=e36]:
              - text: "Every mainstream language — from Fortran to Rust — was built around human cognitive constraints. Agents don't share those constraints. Codifide codifies what software usually leaves implicit: intent, effects, contracts, confidence, and refusal — and preserves those properties with byte-level fidelity across every agent that reads, writes, or composes the code."
              - strong [ref=e37]: The name is the thesis.
            - generic [ref=e38]:
              - generic [ref=e39]:
                - generic [ref=e40]: Intent
                - paragraph [ref=e41]: Every function carries why it exists as structure — not a comment the compiler discards. A symbol's intent is part of its content-addressed identity.
              - generic [ref=e42]:
                - generic [ref=e43]: Effects
                - paragraph [ref=e44]: Declared in the type and enforced transitively across the call graph. A pure function cannot call an impure one and launder the effect.
              - generic [ref=e45]:
                - generic [ref=e46]: Contracts
                - paragraph [ref=e47]: Pre- and postconditions the runtime evaluates — not docstrings. Contracts run with an empty effect budget. They describe state; they do not modify it.
              - generic [ref=e48]:
                - generic [ref=e49]: Confidence
                - paragraph [ref=e50]:
                  - code [ref=e51]: believe label ge(conf(label), 0.85)
                  - text: — probability as a first-class dispatch mechanism. Every value can carry a confidence score.
              - generic [ref=e52]:
                - generic [ref=e53]: Refusal
                - paragraph [ref=e54]:
                  - code [ref=e55]: bottom
                  - text: is a value, not an exception. A function that does not know enough to answer says so. The runtime respects that.
              - generic [ref=e56]:
                - generic [ref=e57]: Fidelity
                - paragraph [ref=e58]: Two agents naming the same content hash see the same bytes, the same contracts, the same intent. No drift. No version gaps. No trust gaps.
            - generic "Code example" [ref=e59]:
              - code [ref=e61]: "def classify intent \"label an image, refuse rather than guess\" sig (img: Image) -> Label effects {model.vision} cand label <- vision.classify(img) believe label ge(conf(label), 0.85) => label ge(conf(label), 0.60) => escalate(img, label) else => bottom"
