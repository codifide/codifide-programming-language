        - generic [ref=e193]:
          - blockquote [ref=e194]:
            - paragraph [ref=e195]: "\"The danger isn't that AI builds bad software. It's that AI builds software so fast that governance can't keep up.\""
          - blockquote [ref=e196]:
            - paragraph [ref=e197]: "\"Kill early, kill cheap. A failed gate at G1 costs hours. A failed gate at G5 costs months.\""
          - blockquote [ref=e198]:
            - paragraph [ref=e199]: "\"Agent-authored code does not have the same failure modes as human-authored code. Our governance frameworks haven't caught up.\""
