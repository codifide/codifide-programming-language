    - region "AI Governance Thinking" [ref=e142]:
      - generic [ref=e144]:
        - generic [ref=e145]:
          - generic [ref=e146]:
            - heading "AI Governance Thinking" [level=2] [ref=e147]
            - paragraph [ref=e148]:
              - text: Agentic AI removes the speed constraint on building. It does not remove the constraint on safety. The question isn't
              - emphasis [ref=e149]: "\"can AI build it?\""
              - text: — it's
              - emphasis [ref=e150]: "\"should this ship?\""
          - generic [ref=e151]:
            - generic [ref=e152]:
              - img [ref=e154]
              - generic [ref=e156]:
                - heading "Speed without governance is faster failure" [level=3] [ref=e157]
                - paragraph [ref=e158]: AI can produce 50 files in an hour. The bottleneck is no longer building — it's deciding what to ship. Governance frameworks must evolve to match the pace of agentic development, not lag behind it.
            - generic [ref=e159]:
              - img [ref=e161]
              - generic [ref=e163]:
                - heading "Evidence, not confidence" [level=3] [ref=e164]
                - paragraph [ref=e165]: "\"We think it's fine\" is not a gate pass. Every gate requires artifacts — test coverage reports, security sign-offs, accessibility audits, integration tests against real backends. Not demos. Not decks."
            - generic [ref=e166]:
              - img [ref=e168]
              - generic [ref=e170]:
                - heading "The builder cannot review their own work" [level=3] [ref=e171]
                - paragraph [ref=e172]: "Teams immersed in development share the same blind spots. A separate adversarial reviewer — different model, different prompt, hostile persona — attacks every gate. A Zero-Context reviewer reads the work as a regulator would: knowing nothing, asking everything."
            - generic [ref=e173]:
              - img [ref=e175]
              - generic [ref=e177]:
                - heading "AI builds. Humans decide." [level=3] [ref=e178]
                - paragraph [ref=e179]: The gate decision — go, kill, hold — is never delegated to the machine. AI provides evidence. Humans decide what ships. That boundary is not a limitation of AI; it's the architecture of accountability.
            - generic [ref=e180]:
              - img [ref=e182]
              - generic [ref=e186]:
                - heading "Intent must survive compilation" [level=3] [ref=e187]
                - paragraph [ref=e188]: When an agent transforms code, the original intent should be preserved — not discarded. Systems that lose intent create accountability gaps that compound at scale. The language is the governance.
          - generic [ref=e189]:
            - link "Read the whitepaper →" [ref=e190] [cursor=pointer]:
              - /url: https://github.com/codifide/agentic-stage-gate-governance
            - link "Follow on LinkedIn" [ref=e191] [cursor=pointer]:
