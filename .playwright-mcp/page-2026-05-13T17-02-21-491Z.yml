          - article "The Codifide Programming Language" [ref=e40]:
            - generic [ref=e41]:
              - img "Codifide Programming Language" [ref=e43]
              - generic [ref=e44]: Open Source · v1.0
            - heading "The Codifide Programming Language" [level=3] [ref=e45]
            - paragraph [ref=e46]: A programming language that codifies what software usually leaves implicit — for a world where agents write the code.
            - paragraph [ref=e47]:
              - text: "Every mainstream language — from Fortran to Rust — was built around human cognitive constraints. Agents don't share those constraints. Codifide codifies what software usually leaves implicit: intent, effects, contracts, confidence, and refusal — and preserves those properties with byte-level fidelity across every agent that reads, writes, or composes the code."
              - strong [ref=e48]: The name is the thesis.
            - generic [ref=e49]:
              - generic [ref=e50]:
                - generic [ref=e51]: Intent
                - paragraph [ref=e52]: Every function carries why it exists as structure — not a comment the compiler discards. A symbol's intent is part of its content-addressed identity.
              - generic [ref=e53]:
                - generic [ref=e54]: Effects
                - paragraph [ref=e55]: Declared in the type and enforced transitively across the call graph. A pure function cannot call an impure one and launder the effect.
              - generic [ref=e56]:
                - generic [ref=e57]: Contracts
                - paragraph [ref=e58]: Pre- and postconditions the runtime evaluates — not docstrings. Contracts run with an empty effect budget. They describe state; they do not modify it.
              - generic [ref=e59]:
                - generic [ref=e60]: Confidence
                - paragraph [ref=e61]:
                  - code [ref=e62]: believe label ge(conf(label), 0.85)
                  - text: — probability as a first-class dispatch mechanism. Every value can carry a confidence score.
              - generic [ref=e63]:
                - generic [ref=e64]: Refusal
                - paragraph [ref=e65]:
                  - code [ref=e66]: bottom
                  - text: is a value, not an exception. A function that does not know enough to answer says so. The runtime respects that.
              - generic [ref=e67]:
                - generic [ref=e68]: Fidelity
                - paragraph [ref=e69]: Two agents naming the same content hash see the same bytes, the same contracts, the same intent. No drift. No version gaps. No trust gaps.
            - generic "Code example" [ref=e70]:
              - code [ref=e72]: "def classify intent \"label an image, refuse rather than guess\" sig (img: Image) -> Label effects {model.vision} cand label <- vision.classify(img) believe label ge(conf(label), 0.85) => label ge(conf(label), 0.60) => escalate(img, label) else => bottom"
