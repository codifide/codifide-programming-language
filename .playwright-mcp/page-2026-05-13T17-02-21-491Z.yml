          - article "Agentic Stage-Gate Governance" [ref=e89]:
            - generic [ref=e90]: AI Governance · Open Source
            - heading "Agentic Stage-Gate Governance" [level=3] [ref=e91]
            - paragraph [ref=e92]: A governance framework for software built by AI agents.
            - paragraph [ref=e93]: When your developer is an AI agent, who watches the gates? This open-source template adapts Robert Cooper's Stage-Gate® framework for a world where AI builds code faster than humans can review it. Copy the steering files into any project — governance, adversarial review, and quality gates activate automatically in Kiro.
            - list "Key features" [ref=e94]:
              - listitem [ref=e95]: 7-gate process (G0–G6) from problem validation to post-launch learning
              - listitem [ref=e96]: "Three-model review: A-Team builder, B-Team critic, Zero-Context auditor"
              - listitem [ref=e97]: 100% test coverage as a gate requirement, not a goal
              - listitem [ref=e98]: Security and accessibility at every gate, not as a phase
              - listitem [ref=e99]: AI builds. Humans decide. Evidence proves.
            - generic "Core principle" [ref=e100]: "\"Evidence, not confidence. 'We think it's fine' is not a gate pass.\""
            - link "View on GitHub →" [ref=e101] [cursor=pointer]:
              - /url: https://github.com/codifide/agentic-stage-gate-governance
