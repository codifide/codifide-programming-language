<?xml version="1.0" encoding="UTF-8"?>
<!--
  Noema logo mark.

  Design intent:
    Three nodes connected by two directed edges plus one return edge
    form a tiny hypergraph. Two nodes are filled (computed values).
    One node is hollow — the ⊥ position, the refusal. The whole
    structure sits inside a hexagonal frame evoking a content-
    addressed identity without literalizing a hash.

    The mark reads as: "a graph of thought, one node of which is
    refusing, contained within a stable identity."

    One color. Works at 16×16 (favicon) and at poster scale.
    Uses currentColor so callers can tint it by setting CSS color.
    Deliberately abstract — no Greek letter, no eye, no circuit
    board. The identity is structural, not ornamental.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     fill="none"
     stroke="currentColor"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round">

  <!-- Hexagonal frame: content-addressed identity.
       Pointed-top hexagon, inscribed in the 100x100 box with
       small padding. -->
  <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" />

  <!-- Node A: top-left, filled. A confident value. -->
  <circle cx="36" cy="40" r="7" fill="currentColor" stroke="none" />

  <!-- Node B: top-right, filled. The next confident value. -->
  <circle cx="64" cy="40" r="7" fill="currentColor" stroke="none" />

  <!-- Node C: bottom-center, hollow. The ⊥ — first-class refusal. -->
  <circle cx="50" cy="70" r="7" fill="none" stroke="currentColor" stroke-width="3" />

  <!-- Edge A → B: direct composition, top path. -->
  <line x1="43" y1="40" x2="57" y2="40" />

  <!-- Edge A → C: descended to refusal. -->
  <line x1="39" y1="46" x2="47" y2="64" />

  <!-- Edge B → C: descended to refusal from the other side. -->
  <line x1="61" y1="46" x2="53" y2="64" />
</svg>
