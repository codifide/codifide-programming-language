<?xml version="1.0" encoding="UTF-8"?>
<!--
  Codifide Language wordmark — split-color wordmark matching the
  company wordmark treatment.

  "codi" renders in the lighter blue-cyan of the company wordmark,
  "fide" in the deeper navy. The split echoes the syllabic break
  in the name itself (codi-fied + fi-delity), which is the design
  intent the Codifide company mark already encodes.

  Below, the sub-brand descriptor "language" in navy, smaller
  weight — the same visual hierarchy the company wordmark uses
  for "confidence in code".

  Layout:
      [mark]    codifide
                language
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 100"
     fill="none"
     stroke-width="3.2"
     stroke-linecap="round"
     stroke-linejoin="round"
     font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace"
     font-weight="700">

  <!-- Mark, color-matched to the Codifide palette -->
  <g>
    <polyline points="50,6 88,28 88,72"    stroke="#3EA8C1" />
    <polyline points="88,72 50,94 12,72"   stroke="#2C6CB8" />
    <polyline points="12,72 12,28 50,6"    stroke="#6B4199" />
    <circle cx="36" cy="40" r="7"  fill="#0A2E5E" />
    <circle cx="64" cy="40" r="7"  fill="#0A2E5E" />
    <circle cx="50" cy="70" r="7"  fill="none"  stroke="#0A2E5E" stroke-width="3.2" />
    <line x1="43" y1="40" x2="57" y2="40" stroke="#0A2E5E" />
    <line x1="39" y1="46" x2="47" y2="64" stroke="#0A2E5E" />
    <line x1="61" y1="46" x2="53" y2="64" stroke="#0A2E5E" />
  </g>

  <!-- Wordmark "codifide" as two text spans, split-colored to
       match the company wordmark. Both spans share font size
       and letter-spacing so only the color distinguishes them.
       The `codi` span uses the lighter company blue; the `fide`
       span uses the deeper navy. -->
  <text x="112" y="52"
        font-size="38"
        letter-spacing="1"
        stroke="none">
    <tspan fill="#3A8FC8">codi</tspan><tspan fill="#1D3A7B">fide</tspan>
  </text>

  <!-- Sub-brand descriptor: "language" -->
  <text x="112" y="82"
        font-size="22"
        letter-spacing="4"
        fill="#1D3A7B"
        stroke="none"
        font-weight="500">language</text>
</svg>
