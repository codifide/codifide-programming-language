<?xml version="1.0" encoding="UTF-8"?>
<!--
  Noema wordmark — mark + typeset name.

  Uses a generic monospace font-family so the rendering context picks
  a reasonable fallback. The word "Noema" sits at the same visual
  weight as the mark. Lowercase chosen because Noema the language is
  not a product, and lowercase reads as technical rather than
  promotional. Letter-spacing is slightly expanded for clarity at
  small sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 320 100"
     fill="none"
     stroke="currentColor"
     stroke-width="3"
     stroke-linecap="round"
     stroke-linejoin="round"
     font-family="ui-monospace, 'SF Mono', 'Cascadia Mono', 'Roboto Mono', Menlo, Consolas, monospace"
     font-weight="500">

  <!-- Mark, inset to match vertical rhythm with the text -->
  <g transform="translate(0,0)">
    <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" />
    <circle cx="36" cy="40" r="7" fill="currentColor" stroke="none" />
    <circle cx="64" cy="40" r="7" fill="currentColor" stroke="none" />
    <circle cx="50" cy="70" r="7" fill="none" stroke="currentColor" stroke-width="3" />
    <line x1="43" y1="40" x2="57" y2="40" />
    <line x1="39" y1="46" x2="47" y2="64" />
    <line x1="61" y1="46" x2="53" y2="64" />
  </g>

  <!-- Wordmark: "noema" in lowercase monospace -->
  <text x="112" y="65"
        font-size="48"
        letter-spacing="2"
        fill="currentColor"
        stroke="none">noema</text>
</svg>
